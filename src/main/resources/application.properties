spring.application.name=Exam-Backend
#DB config
spring.datasource.url=jdbc:mysql://localhost:3306/ewallet_1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
#default server port 8080

# JWT Configuration
jwt.secret=MySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForSecurityPurposes
jwt.expiration=86400000

# Transaction Limits Configuration (real-world style)
wallet.transaction.limit=10000
wallet.daily.limit=50000
wallet.monthly.limit=200000
wallet.min.balance=0.0
wallet.max.balance=100000
beneficiary.max.count=20

# File-based Logging Configuration
logging.service.enabled=true
logging.file.path=LoggingService/logs

# Optional: Make first admin when no admin exists (set userId of the user to promote)
# Uncomment and set to e.g. 1 to make user with userId=1 admin on first startup
# app.first-admin.user-id=1
